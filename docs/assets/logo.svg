<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <!-- Modern Gradient Definition -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#61affe" />
      <stop offset="50%" stop-color="#9012fe" />
      <stop offset="100%" stop-color="#49cc90" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background container (optional, transparent for theme integration) -->
  <rect width="240" height="240" rx="48" fill="none" />

  <!-- Stylized WebSocket Link / Nodes -->
  <g transform="translate(20, 20)">
    <!-- Connection Ring Outer -->
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#brandGradient)" stroke-width="12" stroke-dasharray="320 100" stroke-linecap="round" transform="rotate(-45 100 100)" />
    
    <!-- Central WebSocket Signal Lines -->
    <path d="M 60 100 C 60 75, 140 75, 140 100 C 140 125, 60 125, 60 100 Z" fill="none" stroke="url(#brandGradient)" stroke-width="6" stroke-linecap="round" />
    <path d="M 80 100 C 80 88, 120 88, 120 100 C 120 112, 80 112, 80 100 Z" fill="none" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    
    <!-- Left Node Connection -->
    <circle cx="60" cy="100" r="14" fill="#ffffff" stroke="url(#brandGradient)" stroke-width="8" filter="url(#glow)" />
    <circle cx="60" cy="100" r="6" fill="#1b1b1b" />
    
    <!-- Right Node Connection -->
    <circle cx="140" cy="100" r="14" fill="#ffffff" stroke="url(#brandGradient)" stroke-width="8" filter="url(#glow)" />
    <circle cx="140" cy="100" r="6" fill="#1b1b1b" />
    
    <!-- Core Signal Pulse -->
    <circle cx="100" cy="100" r="12" fill="url(#brandGradient)" />
  </g>
</svg>
